<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow any user to own the Supvan battery provider name and send signals -->
  <policy context="default">
    <allow own="com.supvan.battery"/>
    <allow send_destination="com.supvan.battery"/>
  </policy>
</busconfig>
