# -- Bluetooth name patterns (substring match, case-insensitive) -------------
#
# Used for BT discovery (is_matching_bt_name) and family detection
# (family_for_model_hint). The brand names "supvan" and "katasymbol" are
# always accepted for discovery but don't select a specific family.

[bt_patterns]
supvan_t50 = ["t50", "t0117", "e10", "e11", "e12", "e16"]
supvan_t80 = ["t80"]
supvan_g = ["g11", "g15", "g18"]
supvan_tp76 = ["tp76"]
supvan_tp80 = ["tp80"]
supvan_tp86 = ["tp86"]
supvan_sp650 = ["sp650"]
